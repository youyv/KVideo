name: Upstream Sync

env:
  UPSTREAM_REPO: KuekHaoYang/KVideo
  UPSTREAM_BRANCH: main
  TARGET_BRANCH: main
  SYNC_BRANCH: upstream-sync-conflict

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: upstream-sync-${{ github.repository }}
  cancel-in-progress: true

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Sync and Merge (with PR Fallback)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add upstream "https://github.com/$UPSTREAM_REPO.git"
          git fetch upstream

          echo "Attempting to rebase onto upstream/$UPSTREAM_BRANCH..."

          if git pull --rebase upstream $UPSTREAM_BRANCH; then
            echo "✅ Rebase successful. Pushing changes..."
            git push --force-with-lease origin $TARGET_BRANCH
          else
            echo "⚠️ Rebase conflict detected. Aborting and creating PR..."
            git rebase --abort

            git checkout -B $SYNC_BRANCH upstream/$UPSTREAM_BRANCH
            git push -f origin $SYNC_BRANCH

            gh pr create \
              --title "🚨 Manual Sync Required: Conflicts with Upstream" \
              --body "The automatic sync failed due to rebase conflicts. This PR contains the latest upstream changes. Please resolve conflicts and merge manually." \
              --head $SYNC_BRANCH \
              --base $TARGET_BRANCH \
              || echo "PR already exists or could not be created."
          fi

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GH_PAT }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 3
